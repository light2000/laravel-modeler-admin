<svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Laravel Modeler Admin icon">
  <defs>
    <linearGradient id="tile" x1="5" y1="4" x2="25" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F4F7"/>
    </linearGradient>

    <linearGradient id="redTop" x1="9" y1="7" x2="22" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6B63"/>
      <stop offset="1" stop-color="#F7191D"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.9" flood-color="#111827" flood-opacity="0.18"/>
    </filter>

    <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1
                0 0.15 0 0 0.05
                0 0 0.15 0 0.05
                0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- transparent outside background -->
  <rect x="2" y="2" width="26" height="26" rx="7" fill="url(#tile)"/>

  <!-- red glow -->
  <ellipse cx="15" cy="13.2" rx="8.5" ry="6.3" fill="#FF2A2F" opacity="0.22" filter="url(#redGlow)"/>

  <!-- top model diamond -->
  <g filter="url(#softShadow)">
    <path d="M15 6.2L22.1 9.9L15 13.8L7.9 9.9L15 6.2Z" fill="url(#redTop)"/>
    <path d="M15 6.2L22.1 9.9L15 13.8L7.9 9.9L15 6.2Z" stroke="#D81118" stroke-width="0.45" stroke-linejoin="round"/>
    <path d="M7.9 9.9L15 13.8L22.1 9.9" stroke="#B90F14" stroke-width="0.55" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- relation graph -->
  <g filter="url(#softShadow)" stroke="#FFFFFF" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8.2 15L14.6 18.9L21.8 14.7"/>
    <path d="M8.2 15V21.1L15 24.5V18.9"/>
    <path d="M8.2 21.1L15 24.5"/>
  </g>

  <!-- graph nodes -->
  <g filter="url(#softShadow)" fill="#FFFFFF">
    <circle cx="8.2" cy="15" r="2.05"/>
    <circle cx="21.8" cy="14.7" r="2.05"/>
    <circle cx="14.6" cy="18.9" r="2.05"/>
    <circle cx="8.2" cy="21.1" r="2.05"/>
    <circle cx="15" cy="24.5" r="2.05"/>
  </g>
</svg>
